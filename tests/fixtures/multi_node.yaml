schema_version: 1
nodes:
  - id: greeter
    llm:
      provider: anthropic
      model: claude-sonnet-5
      system: "Greet the user."
  - id: closer
    llm:
      provider: anthropic
      model: claude-sonnet-5
      system: "Say goodbye."
edges:
