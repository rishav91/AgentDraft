name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev dependencies
        # [postgres] and [examples] are both required here, not just [dev]:
        # - [postgres]: the postgres checkpointer code path (compiler.py)
        #   and its own unit test (patches real psycopg/
        #   langgraph.checkpoint.postgres attributes) need it genuinely
        #   importable, and mypy can't resolve those imports' types
        #   without it either.
        # - [examples]: several unit/e2e tests compile a real anthropic-
        #   provider schema without mocking init_chat_model, which needs
        #   langchain-anthropic importable to construct the client at all.
        run: pip install -e ".[dev,examples,postgres]"
        env:
          # This job doesn't need a real bundled canvas UI (ADR-015) - skip
          # the hatch_build.py hook's npm build for a faster, deterministic
          # install regardless of what Node happens to be on this runner.
          AGC_SKIP_CANVAS_BUILD: "1"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy src

      - name: Unit tests
        run: pytest tests/unit

      - name: E2E tests
        run: pytest tests/e2e

      - name: Test coverage (NFR-6.1)
        run: pytest tests/unit tests/e2e --cov=agc --cov-report=term-missing

  canvas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agc (needed by the e2e test to spawn `agc canvas`)
        run: pip install -e ".[dev]"
        env:
          # This job builds canvas itself in the steps below for its own
          # testing purposes - the hatch_build.py hook doing it a second
          # time (via a different npm install) here would be redundant.
          AGC_SKIP_CANVAS_BUILD: "1"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: canvas/package-lock.json

      - name: Install canvas dependencies
        working-directory: canvas
        run: npm ci

      - name: Lint (eslint)
        working-directory: canvas
        run: npm run lint

      - name: Type-check and build (FR-4.1/FR-4.2)
        working-directory: canvas
        run: npm run build

      - name: Unit tests (Vitest)
        working-directory: canvas
        run: npm run test

      - name: Install Playwright browsers
        working-directory: canvas
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright, against the real local API server)
        working-directory: canvas
        run: npm run test:e2e
