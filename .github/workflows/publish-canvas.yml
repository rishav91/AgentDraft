name: Publish canvas package

# canvas/ versions and releases independently of the Python package
# (ADR-015) - a separate tag namespace so the two publish workflows never
# trigger off the same tag.
on:
  push:
    tags:
      - "canvas-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    defaults:
      run:
        working-directory: canvas
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: canvas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          # Classic token auth, not npm Trusted Publishing (OIDC) - npm's OIDC
          # support wasn't independently verified as mature enough to adopt
          # as the initial mechanism (ADR-015). Re-evaluate against current
          # npm docs and swap this in once confirmed.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
