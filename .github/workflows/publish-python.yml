name: Publish Python package

# Triggered by a GitHub Release, not a raw tag push - a Release gives a
# natural place to attach the matching CHANGELOG.md entry (3.5.8).
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # PyPI Trusted Publishing (OIDC) - no PYPI_API_TOKEN secret needed
      # (ADR-015). Requires a one-time Trusted Publisher registration on the
      # PyPI project's settings, pointing at this repo + this workflow file.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
